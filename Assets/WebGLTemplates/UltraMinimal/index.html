<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>MirzkisD1Ex0 | %UNITY_WEB_NAME%</title>
    <script src="%UNITY_WEBGL_LOADER_URL%"></script>
    <script>
        UnityLoader.instantiate("unityContainer", "%UNITY_WEBGL_BUILD_URL%");
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            border: none;
        }

        body {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="unityContainer" style="width:100%; height:100%"></div>

    <script type="text/javascript">
        function PresetCanvas() {
            document.body.parentNode.style.overflow = "hidden"; /*隐藏滚动条*/
            var unityCanvas = document.getElementById("unityContainer");
            unityCanvas.style.width = document.documentElement.clientWidth;
            unityCanvas.style.height = document.documentElement.clientHeight;
        }
        window.onload = PresetCanvas();
        window.onresize = PresetCanvas();
    </script>>
</body>
</html>
